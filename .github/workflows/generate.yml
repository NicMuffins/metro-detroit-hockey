name: Generate hockey iCal feed

on:
  schedule:
    # Runs at 7:00 AM Eastern every day (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py --days 14 --output hockey_sessions.ics --headless true

      - name: Commit and push ics file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hockey_sessions.ics
          git diff --staged --quiet || git commit -m "Update hockey_sessions.ics [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
